<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — CONZURA RMS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-icon"><i class="fas fa-utensils"></i></div>
    <div class="brand">CONZURA</div>
    <div class="tagline">Restaurant Management System</div>
  </div>

  <div class="card">
    <div class="tab-panel active" style="display:block;">
      <h2>Set New Password</h2>
      <p class="sub">Choose a strong password for your account</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          {% if cat in ('error','success') %}
          <div class="alert alert-{{ cat }}">
            <i class="fas fa-{{ 'exclamation-circle' if cat=='error' else 'check-circle' }}"></i> {{ msg }}
          </div>
          {% endif %}
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.reset_password') }}">
        <div class="form-group" style="margin-top:16px;">
          <label>New Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock icon"></i>
            <input type="password" name="password" id="newPw" placeholder="Min 6 characters" required oninput="checkStrength(this.value)" autocomplete="new-password">
            <button type="button" class="toggle-pw" onclick="togglePw('newPw',this)"><i class="fas fa-eye"></i></button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-label" id="strengthLabel">Enter a password</div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock icon"></i>
            <input type="password" name="confirm" id="confirmPw" placeholder="Re-enter new password" required autocomplete="new-password">
            <button type="button" class="toggle-pw" onclick="togglePw('confirmPw',this)"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn-main"><i class="fas fa-check-circle"></i> &nbsp;Reset Password</button>
      </form>
    </div>
  </div>
</div>

<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const icon = btn.querySelector('i');
  if(inp.type==='password') { inp.type='text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
  else { inp.type='password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
}

function checkStrength(pw) {
  let s=0;
  if(pw.length>=6) s++; if(pw.length>=10) s++;
  if(/[A-Z]/.test(pw)) s++; if(/[0-9]/.test(pw)) s++; if(/[^A-Za-z0-9]/.test(pw)) s++;
  const lvl=[
    {w:'0%',c:'#2a2a35',t:'Enter a password'},
    {w:'20%',c:'#e85d5d',t:'Very weak'},
    {w:'40%',c:'#f0a853',t:'Weak'},
    {w:'60%',c:'#f0c853',t:'Fair'},
    {w:'80%',c:'#4eca8b',t:'Strong'},
    {w:'100%',c:'#4eca8b',t:'Very strong ✓'},
  ][s]||{w:'0%',c:'#2a2a35',t:''};
  const f=document.getElementById('strengthFill'), l=document.getElementById('strengthLabel');
  f.style.width=lvl.w; f.style.background=lvl.c; l.textContent=lvl.t; l.style.color=lvl.c;
}
</script>
</body>
</html>
