<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — CONZURA RMS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
<style>
.back-link { background:none; border:none; color:#7a7a8c; cursor:pointer; font-size:13px; margin-bottom:16px; padding:0; display:flex; align-items:center; gap:6px; }
.back-link:hover { color:var(--text); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-icon"><i class="fas fa-utensils"></i></div>
    <div class="brand">CONZURA</div>
    <div class="tagline">Restaurant Management System</div>
  </div>

  <div class="card">
    <div class="tab-panel active" style="display:block;">
      <button class="back-link" onclick="window.location.href='{{ url_for('auth.login') }}'"><i class="fas fa-arrow-left"></i> Back to Login</button>
      <h2>Forgot Password</h2>
      <p class="sub">Enter your email to receive a reset code</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          {% if cat in ('error','success') %}
          <div class="alert alert-{{ cat }}">
            <i class="fas fa-{{ 'exclamation-circle' if cat=='error' else 'check-circle' }}"></i> {{ msg }}
          </div>
          {% endif %}
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope icon"></i>
            <input type="email" name="email" placeholder="Enter your email address" required autofocus>
          </div>
        </div>
        <button type="submit" class="btn-main"><i class="fas fa-paper-plane"></i> &nbsp;Send Reset Code</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
