<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Menu</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:20px;
        }

        h1{
            text-align:center;
        }

        .category{
            margin-top:30px;
        }

        .item{
            background:white;
            padding:15px;
            margin:10px 0;
            border-radius:10px;
            box-shadow:0 0 5px rgba(0,0,0,0.1);
        }

        .price{
            color:green;
            font-weight:bold;
        }

    </style>
</head>
<body>

<h1>CONZURA Restaurant Menu</h1>

{% for category in categories %}

<div class="category">

    <h2>{{ category.category }}</h2>

    {% for item in items %}
        {% if item.category == category.category %}

        <div class="item">

            <h3>{{ item.name }}</h3>

            <p>{{ item.description }}</p>

            <div class="price">
                ₹ {{ item.price }}
            </div>

        </div>

        {% endif %}
    {% endfor %}

</div>

{% endfor %}

</body>
</html>
